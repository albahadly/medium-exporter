<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <link rel="stylesheet" href="popup.css" />
  <title>Medium Exporter</title>
</head>
<body>
  <div id="app">
    <header>
      <h1>Medium Exporter <span id="version"></span></h1>
    </header>

    <section id="article-info">
      <p id="article-title" class="info-field">--</p>
      <p id="article-url" class="info-field url">--</p>
    </section>

    <section id="list-mode" class="hidden">
      <p id="list-title" class="info-field"></p>
      <p id="list-count" class="info-field url"></p>
      <div id="list-actions">
        <button id="btn-download-all" disabled>Download All as ZIP</button>
      </div>
      <div id="batch-progress" class="hidden">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="progress-label"></p>
      </div>
    </section>

    <section id="options">
      <label class="toggle-row">
        <input type="checkbox" id="toggle-frontmatter" checked />
        <span>Include frontmatter</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="toggle-images" checked />
        <span>Include images</span>
      </label>
    </section>

    <section id="actions">
      <button id="btn-copy" disabled>Copy as Markdown</button>
      <button id="btn-download" disabled>Download .md</button>
      <button id="btn-obsidian" disabled>Send to Obsidian</button>
      <button id="btn-wordpress" disabled>Send to WordPress</button>
    </section>

    <section id="obsidian-settings">
      <button id="btn-toggle-settings" class="link-btn" type="button">Obsidian Settings</button>
      <div id="settings-panel" class="hidden">
        <label class="settings-label">
          API URL
          <input type="text" id="setting-api-url" placeholder="http://127.0.0.1:27123" />
        </label>
        <label class="settings-label">
          API Key
          <input type="password" id="setting-api-key" placeholder="Paste from Local REST API plugin" />
        </label>
        <label class="settings-label">
          Vault folder <span class="hint">(optional, defaults to vault root)</span>
          <input type="text" id="setting-folder" placeholder="e.g. Medium Articles/" />
        </label>
        <div class="settings-actions">
          <button id="btn-save-settings" type="button">Save</button>
          <button id="btn-test-connection" type="button">Test</button>
        </div>
      </div>
    </section>

    <section id="wordpress-settings">
      <button id="btn-toggle-wp-settings" class="link-btn" type="button">WordPress Settings</button>
      <div id="wp-settings-panel" class="hidden">
        <label class="settings-label">
          Endpoint URL
          <input type="text" id="wp-setting-endpoint" placeholder="http://192.168.68.92:9879/wp-json/wp/v2/posts" />
        </label>
        <label class="settings-label">
          Username
          <input type="text" id="wp-setting-username" placeholder="WordPress username" />
        </label>
        <label class="settings-label">
          Application Password
          <input type="password" id="wp-setting-password" placeholder="Application Password from WordPress" />
        </label>
        <div class="settings-actions">
          <button id="btn-wp-save-settings" type="button">Save</button>
        </div>
      </div>
    </section>

    <section id="status">
      <p id="status-message"></p>
    </section>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
